
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Observer Pattern - Weather Station</title>
    </head>
    <body>
        <div class="container">
            <h1>🌤️ Weather Station - Observer Pattern</h1>
            
            <div class="controls">
                <div class="control-group">
                    <label>Temperatura (°C):</label>
                    <input type="number" id="tempInput" value="20" step="0.1">
                    <button onclick="updateTemperature()">Actualizar</button>
                </div>
                
                <div class="control-group">
                    <label>Presión (hPa):</label>
                    <input type="number" id="pressureInput" value="1013" step="0.1">
                    <button onclick="updatePressure()">Actualizar</button>
                </div>
                
                <div class="control-group">
                    <button onclick="updateBoth()" style="flex: 1;">Actualizar Ambos</button>
                    <button onclick="addDisplay()" class="add-display">+ Agregar Display</button>
                </div>
            </div>
            
            <h2>Displays Activos:</h2>
            <div id="displays" class="displays"></div>
        </div>
        <script src="script.js">

        </script>
    </body>

</html>
